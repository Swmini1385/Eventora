<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile | Eventora</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="student_profile.css">
    <style>
        .profile-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
            position: relative;
        }

        /* DIGITAL ID CARD STYLES */
        .id-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 1.5rem;
            border: 2px solid rgba(255,255,255,0.1);
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 2rem;
            position: relative;
        }

        .id-header {
            background: var(--primary);
            color: white;
            padding: 1.25rem;
            text-align: center;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.9rem;
            border-bottom: 4px solid rgba(255,255,255,0.1);
        }

        .id-body {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 1.5rem;
        }

        .photo-container {
            width: 150px;
            height: 150px;
            border-radius: 1rem;
            background: rgba(255,255,255,0.05);
            border: 2px dashed rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            position: relative;
            transition: 0.3s;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-container:hover {
            border-color: var(--primary);
            transform: scale(1.02);
        }

        .photo-overlay {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.5);
            padding: 0.5rem;
            color: white;
            font-size: 0.7rem;
            opacity: 0;
            transition: 0.3s;
        }

        .photo-container:hover .photo-overlay {
            opacity: 1;
        }

        .id-info {
            width: 100%;
            text-align: left;
        }

        .id-name {
            font-size: 1.75rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 0.25rem;
            text-align: center;
            text-transform: uppercase;
        }

        .id-number {
            color: var(--primary);
            font-weight: 700;
            text-align: center;
            margin-bottom: 1.5rem;
            font-family: monospace;
            font-size: 1.1rem;
        }

        .id-detail-row {
            display: flex;
            margin-bottom: 0.75rem;
            gap: 1rem;
            font-size: 0.9rem;
        }

        .id-label {
            color: var(--text-muted);
            width: 80px;
            flex-shrink: 0;
        }

        .id-value {
            color: #e2e8f0;
            font-weight: 500;
        }

        /* SECTION STYLES */
        .section-card {
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
            font-size: 1.1rem;
            color: #fff;
        }

        /* NEW ID CARD (3.5" x 2.25") */
        #id-card-view {
            width: 3.5in;
            height: 2.25in;
            background: #fff9f0;
            border-radius: 12px;
            border: 2px solid #ddd;
            overflow: hidden;
            position: relative;
            margin: 0 auto 2rem;
            display: none; /* Hidden by default, shown by button */
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            font-family: 'Outfit', sans-serif;
            color: #333;
        }

        .id-header-v2 {
            background: #f59e0b; /* Orange-yellow */
            color: white;
            padding: 8px;
            text-align: center;
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .id-body-v2 {
            padding: 12px;
            display: flex;
            gap: 15px;
            height: calc(2.25in - 65px);
            align-items: flex-start;
            position: relative;
            z-index: 1;
        }

        .id-watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.05;
            width: 120px;
            z-index: 0;
            pointer-events: none;
        }

        .id-photo-v2 {
            width: 80px;
            height: 95px;
            border: 2px solid #f59e0b;
            border-radius: 6px;
            object-fit: cover;
            background: #eee;
        }

        .id-details-v2 {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .id-field {
            font-size: 0.65rem;
            color: #f59e0b;
            font-weight: 700;
            text-transform: uppercase;
        }

        .id-value-v2 {
            font-size: 0.85rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 3px;
        }

        .id-footer-v2 {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: #1e293b;
            color: white;
            padding: 6px;
            text-align: center;
            font-size: 0.65rem;
            font-weight: 600;
        }

        .id-badge {
            background: white;
            border: 1px solid #f59e0b;
            color: #f59e0b;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 4px;
            margin-top: 5px;
            display: inline-block;
        }

        /* PRINT CSS */
        @media print {
            body * { visibility: hidden; }
            #id-card-view, #id-card-view * { visibility: visible; }
            #id-card-view {
                position: fixed;
                left: 0;
                top: 0;
                display: block !important;
                margin: 0;
                box-shadow: none;
                border: 1px solid #eee;
                -webkit-print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <!-- Top Nav -->
        <div style="display: flex; justify-content: space-between; margin-bottom: 1.5rem; align-items: center;">
            <div style="font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 0.5rem;">
                <i data-lucide="sparkles"></i> Student Portal
            </div>
            <button onclick="logout()" class="btn btn-outline" style="padding: 0.5rem 1rem; font-size: 0.8rem; color: #f87171;">
                Logout
            </button>
        </div>

        <!-- NEW CONTROLS -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem;">
            <button onclick="toggleID()" class="btn" style="background: #4ade80; color: white; display: flex; flex-direction: column; align-items: center; padding: 1rem; height: auto;">
                <i data-lucide="contact-2" size="24" style="margin-bottom: 0.5rem;"></i>
                <span style="font-weight: 700; font-size: 0.9rem;">🪪 Show ID Card</span>
            </button>
            <button onclick="window.print()" class="btn" style="background: #1e293b; color: white; display: flex; flex-direction: column; align-items: center; padding: 1rem; height: auto;">
                <i data-lucide="printer" size="24" style="margin-bottom: 0.5rem;"></i>
                <span style="font-weight: 700; font-size: 0.9rem;">🖨️ Print ID</span>
            </button>
        </div>

        <!-- REDESIGNED ID CARD -->
        <div id="id-card-view">
            <div class="id-header-v2" id="id-event-header">CHIMUKLA UTSAV SUMMER CAMP 2026</div>
            <div class="id-body-v2">
                <img src="https://api.dicebear.com/7.x/initials/svg?seed=E" class="id-watermark">
                <div>
                    <img id="id-photo" src="https://api.dicebear.com/7.x/initials/svg?seed=E" class="id-photo-v2">
                    <br>
                    <div class="id-badge" id="id-badge-val">ID: C000k</div>
                </div>
                <div class="id-details-v2">
                    <div class="id-field">NAME</div>
                    <div class="id-value-v2" id="id-name">Yogesh</div>
                    
                    <div class="id-field">MOBILE</div>
                    <div class="id-value-v2" id="id-phone">9850254914</div>
                    
                    <div class="id-field">ADDRESS</div>
                    <div class="id-value-v2" id="id-address">Deola</div>
                </div>
            </div>
            <div class="id-footer-v2">Summer Camp 2026 Official ID Card</div>
        </div>

        <!-- ATTENDANCE LOG -->
        <div class="glass section-card">
            <div class="section-title">
                <i data-lucide="calendar-check" color="var(--primary)"></i> Attendance History
            </div>
            <div id="attendance-list">
                <p style="text-align: center; color: var(--text-muted); padding: 1rem;">No attendance records found yet.</p>
            </div>
        </div>

        <!-- PAYMENT & LINKS -->
        <div class="glass section-card">
            <div class="section-title">
                <i data-lucide="credit-card" color="#fbbf24"></i> Payment & Groups
            </div>
            <div class="attendance-item">
                <span style="color: var(--text-muted);">Mode</span>
                <span style="font-weight: 600;" id="id-payment-mode">--</span>
            </div>
            <div id="wa-section" style="margin-top: 1rem; display: none;">
                <a href="#" id="wa-link" target="_blank" class="btn" style="background: #25D366; color: white; width: 100%; font-weight: 700; border-radius: 0.75rem;">
                    Join WhatsApp Group <i data-lucide="message-circle" size="18"></i>
                </a>
            </div>
        </div>
    </div>

    <!-- EDIT MODAL -->
    <div id="edit-modal" class="modal">
        <div class="glass modal-content">
            <div class="close-btn" onclick="closeEditModal()"><i data-lucide="x"></i></div>
            <h2 style="margin-bottom: 1.5rem;">Edit Personal Details</h2>
            <form id="edit-form" onsubmit="handleUpdate(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="edit-name" required>
                </div>
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="tel" id="edit-phone" required>
                </div>
                <div class="form-group">
                    <label>Email (Optional)</label>
                    <input type="email" id="edit-email">
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <textarea id="edit-address" rows="2" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; margin-top: 1rem;" id="update-btn">
                    Save Changes
                </button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyaMg4MdPTN_GYkfmpfti3M5JTAchwLm-F8UCMQVyjS9Gn7PjyBOiBs7dK4onASyaQPdQ/exec";
        let studentData = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadProfile();
            lucide.createIcons();
        });

        // JSONP Helper
        function fetchJSONP(url, callbackName) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                const name = callbackName || `jsonp_${Date.now()}_${Math.floor(Math.random()*1000)}`;
                window[name] = (data) => { cleanup(); resolve(data); };
                script.onerror = () => { cleanup(); reject(new Error('Request failed')); };
                const connector = url.includes('?') ? '&' : '?';
                script.src = `${url}${connector}callback=${name}`;
                document.body.appendChild(script);
                function cleanup() { delete window[name]; if (script.parentNode) document.body.removeChild(script); }
                setTimeout(() => { if (window[name]) { cleanup(); reject(new Error('Cloud timeout')); } }, 30000);
            });
        }

        function toggleID() {
            const card = document.getElementById('id-card-view');
            card.style.display = (card.style.display === 'none' || card.style.display === '') ? 'block' : 'none';
            if (card.style.display === 'block') card.scrollIntoView({ behavior: 'smooth' });
        }

        async function loadProfile() {
            const urlParams = new URLSearchParams(window.location.search);
            const eventId = urlParams.get('eventId');
            const studentId = urlParams.get('studentId');

            if (!eventId || !studentId) {
                alert("Invalid session. Redirecting to login.");
                logout();
                return;
            }

            try {
                const data = await fetchJSONP(`${API_URL}?action=get_student_profile&eventId=${eventId}&studentId=${studentId}`);
                if (data.success) {
                    studentData = data.student;
                    updateUI();
                    loadAttendance();
                } else {
                    alert("Profile error: " + data.message);
                }
            } catch (err) {
                console.error(err);
            }
        }

        function updateUI() {
            const s = studentData;
            document.getElementById('id-name').innerText = s.name;
            document.getElementById('id-badge-val').innerText = `ID: ${s.id}`;
            document.getElementById('id-phone').innerText = s.phone;
            document.getElementById('id-address').innerText = s.address || '--';
            
            if (s.photoId) {
                document.getElementById('id-photo').src = `https://lh3.googleusercontent.com/d/${s.photoId}=s300`;
            } else {
                document.getElementById('id-photo').src = `https://api.dicebear.com/7.x/initials/svg?seed=${s.name}`;
            }

            // Prep Modal
            document.getElementById('edit-name').value = s.name;
            document.getElementById('edit-phone').value = s.phone;
            document.getElementById('edit-email').value = s.email || '';
            document.getElementById('edit-address').value = s.address || '';
        }

        async function loadAttendance() {
            try {
                // 1. Fetch Event Info to get Start/End dates
                const eventData = await fetchJSONP(`${API_URL}?action=get_event_info&eventId=${studentData.eventId}`);
                if (!eventData.success) throw "Event info failed";
                
                // 2. Fetch Student Attendance Logs
                const data = await fetchJSONP(`${API_URL}?action=get_student_attendance&eventId=${studentData.eventId}&studentId=${studentData.id}`);
                const markedDates = data.success ? data.attendance.map(dt => new Date(dt).toLocaleDateString()) : [];
                
                // 3. Calculate Date Range (Start -> Today or End)
                const start = new Date(eventData.startDate);
                const endLimit = new Date(); // Today
                const eventEnd = eventData.endDate ? new Date(eventData.endDate) : endLimit;
                const lastShowDate = endLimit < eventEnd ? endLimit : eventEnd;
                
                const list = document.getElementById('attendance-list');
                let html = '';
                
                let runner = new Date(start);
                while (runner <= lastShowDate) {
                    const dateStr = runner.toLocaleDateString();
                    const isPresent = markedDates.includes(dateStr);
                    
                    html += `
                        <div class="attendance-item" style="display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid var(--glass-border);">
                            <span>${runner.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' })}</span>
                            <span style="color: ${isPresent ? '#4ade80' : '#f87171'}; font-weight: 700;">
                                ${isPresent ? 'Present' : 'Absent'}
                                <i data-lucide="${isPresent ? 'check-circle' : 'x-circle'}" size="14"></i>
                            </span>
                        </div>
                    `;
                    runner.setDate(runner.getDate() + 1);
                }
                
                list.innerHTML = html || `<p style="text-align: center; color: var(--text-muted); padding: 1rem;">Event hasn't started yet.</p>`;
                lucide.createIcons();

                // Update Header & Card
                const eventNameCap = eventData.name ? eventData.name.toUpperCase() : "EVENTORA EVENT";
                document.getElementById('id-event-header').innerText = eventNameCap;
                document.getElementById('id-card-view').querySelector('.id-footer-v2').innerText = `${eventData.name} Official ID Card`;
                
                if (eventData.wa) {
                    document.getElementById('wa-section').style.display = 'block';
                    document.getElementById('wa-link').href = eventData.wa;
                }
            } catch (err) { 
                console.error(err); 
                document.getElementById('attendance-list').innerHTML = `<p style="text-align: center; color: #f87171; padding: 1rem;">Error loading records.</p>`;
            }
        }

        function openEditModal() { document.getElementById('edit-modal').style.display = 'flex'; }
        function closeEditModal() { document.getElementById('edit-modal').style.display = 'none'; }

        async function handleUpdate(e) {
            e.preventDefault();
            const btn = document.getElementById('update-btn');
            btn.disabled = true;
            btn.innerText = "Saving... ⏳";

            const payload = {
                action: 'update_student_profile',
                eventId: studentData.eventId,
                studentId: studentData.id,
                name: document.getElementById('edit-name').value,
                phone: document.getElementById('edit-phone').value,
                email: document.getElementById('edit-email').value,
                address: document.getElementById('edit-address').value
            };

            try {
                const data = await fetchJSONP(`${API_URL}?${new URLSearchParams(payload).toString()}`);
                if (data.success) {
                    alert("✅ Profile Updated!");
                    location.reload();
                } else {
                    alert("❌ Update failed: " + data.message);
                }
            } catch (err) { alert("Connection Error"); }
            btn.disabled = false;
        }

        async function uploadPhoto(input) {
            if (!input.files || !input.files[0]) return;
            
            const file = input.files[0];
            const reader = new FileReader();
            
            document.getElementById('id-photo').style.opacity = "0.3";
            
            reader.onload = async (e) => {
                const base64 = e.target.result;
                try {
                    const data = await fetchJSONP(`${API_URL}?action=upload_student_photo&fileData=${encodeURIComponent(base64)}&fileName=${studentData.id}.jpg`);
                    if (data.success) {
                        // Now update profile with this photoId
                        const upd = await fetchJSONP(`${API_URL}?action=update_student_profile&eventId=${studentData.eventId}&studentId=${studentData.id}&photoId=${data.fileId}`);
                        if (upd.success) {
                            alert("✅ Photo Updated!");
                            location.reload();
                        }
                    }
                } catch (err) { alert("Upload failed."); }
            };
            reader.readAsDataURL(file);
        }

        function logout() {
            localStorage.removeItem('eventora_student');
            window.location.href = 'auth.html?mode=student';
        }
    </script>
</body>
</html>
