<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizer Auth | Eventora</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding: 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
            animation: fadeIn 0.4s ease-out;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 0.75rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .auth-toggle {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .auth-toggle a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-toggle a:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
            display: none;
            font-size: 0.9rem;
            align-items: center;
            gap: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container" style="padding: 20px 0;">
        <nav>
            <a href="index.html" class="logo" style="text-decoration: none;">
                <i data-lucide="sparkles"></i> Eventora
            </a>
        </nav>

        <div class="auth-container">
            <div class="glass auth-card">
                <h2 id="auth-title" style="margin-bottom: 0.5rem;">Welcome Back</h2>
                <p id="auth-subtitle" style="color: var(--text-muted); margin-bottom: 1.5rem;">Please sign in to manage your events.</p>

                <!-- Auth Tabs -->
                <div style="display: flex; gap: 0.5rem; margin-bottom: 2rem; background: rgba(255,255,255,0.05); padding: 0.4rem; border-radius: 0.75rem; border: 1px solid var(--glass-border);">
                    <button onclick="setMode('login')" id="tab-organizer" style="flex: 1; padding: 0.6rem; border-radius: 0.5rem; border: none; background: var(--primary); color: white; font-weight: 600; cursor: pointer; transition: 0.3s;">
                        Organizer
                    </button>
                    <button onclick="setMode('student')" id="tab-student" style="flex: 1; padding: 0.6rem; border-radius: 0.5rem; border: none; background: transparent; color: var(--text-muted); font-weight: 600; cursor: pointer; transition: 0.3s;">
                        Student
                    </button>
                </div>

                <div id="error-msg"> <i data-lucide="alert-circle" size="18"></i> <span>System error, try again.</span></div>

                <form id="auth-form" onsubmit="handleAuth(event)">
                    <!-- Signup Fields (Hidden initially for Login) -->
                    <div class="form-group signup-only" style="display: none;">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="John Doe">
                    </div>

                    <div class="form-group">
                        <label for="identifier">Email or Mobile Number</label>
                        <input type="text" id="identifier" required placeholder="name@email.com">
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required placeholder="••••••••">
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;" id="submit-btn">
                        Sign In
                    </button>
                    <p style="text-align: center; margin-top: 1.5rem; font-size: 0.8rem; color: var(--text-muted);">By continuing, you agree to our Terms and Privacy Policy.</p>
                </form>

                <div class="auth-toggle">
                    <span id="toggle-text">Don't have an account?</span> 
                    <a href="#" onclick="toggleAuthMode(event)" id="toggle-link">Create one</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwiY-bbQror7JVf9t6oMNeVP_voKVlCHURIIVqSlIs4eGq74Y01uTPcy9ud9BQyhn3Jeg/exec";
        let currentMode = 'login';

        // Check URL for mode
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const mode = urlParams.get('mode');
            if (mode === 'signup') {
                setMode('signup');
            }
            lucide.createIcons();
        };

        function setMode(mode) {
            currentMode = mode;
            const title = document.getElementById('auth-title');
            const subtitle = document.getElementById('auth-subtitle');
            const submitBtn = document.getElementById('submit-btn');
            const signupFields = document.querySelectorAll('.signup-only');
            const toggleText = document.getElementById('toggle-text');
            const toggleLink = document.getElementById('toggle-link');
            
            // Tab highlight logic
            const tabOrg = document.getElementById('tab-organizer');
            const tabStd = document.getElementById('tab-student');

            if (mode === 'student') {
                tabStd.style.background = 'var(--primary)';
                tabStd.style.color = 'white';
                tabOrg.style.background = 'transparent';
                tabOrg.style.color = 'var(--text-muted)';
                
                title.innerText = "Student Portal";
                subtitle.innerText = "Enter your Registration ID and Password.";
                submitBtn.innerText = "Access Profile";
                signupFields.forEach(f => f.style.display = 'none');
                toggleText.innerText = "Organizer?";
                toggleLink.innerText = "Sign in here";
                document.getElementById('identifier').placeholder = "e.g. SC0001";
                document.querySelector('label[for="identifier"]').innerText = "Student ID";
            } else {
                tabOrg.style.background = 'var(--primary)';
                tabOrg.style.color = 'white';
                tabStd.style.background = 'transparent';
                tabStd.style.color = 'var(--text-muted)';
                
                if (mode === 'signup') {
                    title.innerText = "Become an Organizer";
                    subtitle.innerText = "Start managing your events professionally today.";
                    submitBtn.innerText = "Create Account";
                    signupFields.forEach(f => f.style.display = 'block');
                    toggleText.innerText = "Already have an account?";
                    toggleLink.innerText = "Sign in instead";
                } else {
                    title.innerText = "Welcome Back";
                    subtitle.innerText = "Please sign in to manage your events.";
                    submitBtn.innerText = "Sign In";
                    signupFields.forEach(f => f.style.display = 'none');
                    toggleText.innerText = "Don't have an account?";
                    toggleLink.innerText = "Create one";
                }
                document.getElementById('identifier').placeholder = "name@email.com";
                document.querySelector('label[for="identifier"]').innerText = "Email or Mobile Number";
            }
        }

        function toggleAuthMode(e) {
            e.preventDefault();
            setMode(currentMode === 'login' ? 'signup' : 'login');
        }

        // JSONP Helper for CORS compatibility
        function fetchJSONP(url, callbackName) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                const name = callbackName || `jsonp_${Date.now()}_${Math.floor(Math.random()*1000)}`;
                window[name] = (data) => {
                    cleanup();
                    resolve(data);
                };
                script.onerror = () => {
                    cleanup();
                    reject(new Error('JSONP request failed'));
                };
                const connector = url.includes('?') ? '&' : '?';
                script.src = `${url}${connector}callback=${name}`;
                document.body.appendChild(script);
                function cleanup() {
                    delete window[name];
                    if (script.parentNode) document.body.removeChild(script);
                }
                setTimeout(() => { if (window[name]) { cleanup(); reject(new Error('Auth request timed out (30s)')); } }, 30000);
            });
        }

        async function handleAuth(e) {
            e.preventDefault();
            const identifier = document.getElementById('identifier').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;
            const errorMsg = document.getElementById('error-msg');
            const submitBtn = document.getElementById('submit-btn');

            errorMsg.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.innerText = "Processing... ⏳";

            try {
                let url;
                if (currentMode === 'student') {
                    const urlParams = new URLSearchParams(window.location.search);
                    const eventId = urlParams.get('eventId');
                    
                    // The backend now supports global login without eventId, 
                    // so we only send it if it's already in the URL.
                    url = `${API_URL}?action=student_login&studentId=${identifier}&password=${password}`;
                    if (eventId) url += `&eventId=${eventId}`;
                } else {
                    url = `${API_URL}?action=signup&identifier=${identifier}&password=${password}&name=${name}`;
                    if (currentMode === 'login') {
                        url = `${API_URL}?action=login&identifier=${identifier}&password=${password}`;
                    }
                }

                const data = await fetchJSONP(url);
                
                if (data.success) {
                    if (currentMode === 'student') {
                        localStorage.setItem('eventora_student', JSON.stringify(data.student));
                        window.location.href = `student-profile.html?eventId=${data.student.eventId}&studentId=${data.student.id}`;
                    } else {
                        localStorage.setItem('eventora_user', JSON.stringify({ 
                            name: data.user.name,
                            identifier: data.user.identifier,
                            folderId: data.user.folderId
                        }));
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    errorMsg.innerText = "❌ " + (data.message || "Invalid credentials.");
                    errorMsg.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.innerText = (currentMode === 'login' ? 'Sign In' : currentMode === 'student' ? 'Access Profile' : 'Create Account');
                }
            } catch (err) {
                console.error(err);
                errorMsg.innerText = "⚠️ " + (err.message || "Connection error. Please try again.");
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerText = (currentMode === 'login' ? 'Sign In' : 'Create Account');
            }
        }
    </script>
</body>
</html>
