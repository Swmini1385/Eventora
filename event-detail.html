<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details | Eventora</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .header-section {
            margin-bottom: 1rem;
            padding: 2.5rem 2rem;
            border-radius: 1.5rem;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(168, 85, 247, 0.1) 100%);
            border: 1px solid var(--glass-border);
            position: relative;
        }

        .header-content { position: relative; z-index: 1; }

        .stats-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card-mini {
            flex: 1;
            padding: 1.25rem;
            border-radius: 1.25rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 0.2rem;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .search-box {
            width: 280px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 3rem;
        }

        .search-box i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        /* NEW TABLE STYLES */
        .attendee-table th {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(255,255,255,0.03);
        }

        .inline-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 4px;
            color: white;
            padding: 0.3rem 0.5rem;
            font-size: 0.85rem;
            width: 100%;
            transition: 0.3s;
        }

        .inline-input:focus {
            border-color: var(--primary);
            outline: none;
            background: rgba(255,255,255,0.1);
        }

        .status-badge {
            font-size: 0.7rem;
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-confirmed { background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.2); }
        .status-pending { background: rgba(248, 113, 113, 0.1); color: #f87171; border: 1px solid rgba(248, 113, 113, 0.2); }

        .btn-attendance {
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-attendance.marked {
            background: #4ade80;
            color: #0f172a;
            border-color: #4ade80;
        }

        .btn-attendance.marked:hover {
            background: #22c55e;
        }

        .photo-id-link {
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: 0.3s;
        }

        .photo-id-link:hover {
            transform: scale(1.05);
            color: var(--primary);
        }

        /* PRINT STYLES */
        #print-area {
            display: none;
        }

        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area {
                display: block !important;
                position: absolute;
                left: 0; top: 0; width: 210mm;
            }
            .print-page {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10mm;
                padding: 10mm;
                page-break-after: always;
            }
            .id-card-print {
                width: 3.5in;
                height: 2.25in;
                border: 1px solid #ccc;
                border-radius: 8px;
                padding: 8px;
                display: flex;
                flex-direction: column;
                background: white;
                color: black;
                font-family: 'Outfit', sans-serif;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Main Event Header Card -->
        <div class="header-section glass">
            <div class="header-content">
                <a href="dashboard.html" style="text-decoration: none; color: var(--primary); font-size: 0.85rem; font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;">
                    <i data-lucide="chevron-left" size="16"></i> Dashboard
                </a>
                <h1 id="event-title" style="margin:0; font-size: 2.5rem; line-height: 1.4; color: #fff;">Loading Event...</h1>
                <div id="event-meta" style="color: var(--text-muted); margin-top: 1.5rem; display: flex; align-items: center; gap: 1.5rem; font-size: 0.95rem;">
                    Fetching details...
                </div>
            </div>
            <!-- Share Floating -->
            <button class="btn btn-outline" onclick="copyLink()" style="position: absolute; top: 2rem; right: 2rem; padding: 0.6rem 1rem; font-size: 0.85rem; border-radius: 12px; background: rgba(255,255,255,0.05);">
                <i data-lucide="share-2" size="16"></i> Share Link
            </button>
            <input type="text" id="reg-link" value="" readonly style="display: none;">
        </div>

        <!-- Distinct Stats Row -->
        <div class="stats-row">
            <div class="stat-card-mini glass">
                <div class="stat-value" id="attendee-count">0</div>
                <div class="stat-label">Participants</div>
            </div>
            <div class="stat-card-mini glass">
                <div class="stat-value" id="total-collected">₹0</div>
                <div class="stat-label">Total Amount</div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls" style="margin-top: 1rem; align-items: center;">
            <div class="search-box glass" style="background: rgba(255,255,255,0.02); border-radius: 1.25rem;">
                <i data-lucide="search"></i>
                <input type="text" id="attendee-search" placeholder="Search..." oninput="filterAttendees()" style="background: none; border: none;">
            </div>
            
            <div style="display: flex; gap: 0.75rem; flex-wrap: wrap;">
                <button class="btn btn-outline" onclick="printSelectedIDs()" style="border-radius: 1.25rem; background: rgba(99, 102, 241, 0.1); color: var(--primary); border-color: rgba(99, 102, 241, 0.3);">
                    <i data-lucide="printer"></i> Print ID Cards
                </button>
                <button class="btn btn-outline" onclick="openPhotoModal()" style="border-radius: 1.25rem; background: rgba(168, 85, 247, 0.1); color: #a855f7; border-color: rgba(168, 85, 247, 0.3);">
                    <i data-lucide="image-plus"></i> Activity Photos
                </button>
                <button class="btn btn-outline" onclick="exportData()" style="border-radius: 1.25rem;"><i data-lucide="download"></i> Export</button>
                <a href="#" id="test-link" target="_blank" class="btn btn-primary" style="text-decoration: none; border-radius: 1.25rem;"><i data-lucide="external-link"></i> Open Form</a>
            </div>
        </div>

        <!-- Attendees Table -->
        <div style="overflow-x: auto;">
            <table class="attendee-table">
                <thead>
                    <tr>
                        <th style="width: 40px; text-align: center;">
                            <input type="checkbox" id="select-all" onchange="toggleSelectAll(this)" style="width: 18px; height: 18px; cursor: pointer;">
                        </th>
                        <th style="width: 40px;">Sr</th>
                        <th style="width: 80px;">Photo & ID</th>
                        <th>Name & Personal Info</th>
                        <th style="width: 120px;">Attendance</th>
                        <th style="width: 90px;">Amount</th>
                        <th style="width: 110px;">Payment</th>
                        <th style="width: 100px;">Status</th>
                    </tr>
                </thead>
                <tbody id="attendee-list">
                    <tr><td colspan="9" style="text-align: center; padding: 4rem; color: var(--text-muted);">Loading participants... ⏳</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Upload Photos Modal -->
    <div id="photo-modal" class="modal-overlay" style="display: none;">
        <div class="glass modal-card" style="max-width: 500px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2 style="margin: 0;">Upload Activity Photos</h2>
                <button type="button" onclick="closePhotoModal()" style="background: none; border: none; color: #fff; cursor: pointer;"><i data-lucide="x"></i></button>
            </div>
            
            <div id="selected-tags-preview" style="background: rgba(99, 102, 241, 0.1); padding: 1rem; border-radius: 1rem; margin-bottom: 1.5rem; border: 1px solid rgba(99, 102, 241, 0.2);">
                <p style="font-size: 0.8rem; color: var(--primary); font-weight: 700; margin: 0 0 0.5rem 0; text-transform: uppercase;">Tagging Participants:</p>
                <div id="tag-names-list" style="display: flex; flex-wrap: wrap; gap: 0.5rem; font-size: 0.85rem;">
                    <!-- Names will be injected here -->
                </div>
            </div>

            <form id="activity-photo-form" onsubmit="handleActivityUpload(event)">
                <div class="form-group">
                    <label>Select Photos (Multiple)</label>
                    <input type="file" id="activity-files" multiple accept="image/*" required style="padding: 1rem; cursor: pointer;">
                </div>
                <div class="form-group">
                    <label>Short Description / Activity Name</label>
                    <input type="text" id="activity-desc" placeholder="e.g. Morning Yoga Session">
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.5rem;">
                    <button type="button" onclick="closePhotoModal()" class="btn btn-outline">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="upload-activity-btn">Start Upload</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Print Hidden Area -->
    <div id="print-area"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyaMg4MdPTN_GYkfmpfti3M5JTAchwLm-F8UCMQVyjS9Gn7PjyBOiBs7dK4onASyaQPdQ/exec";
        let currentEventId = '';
        let allAttendees = [];

        document.addEventListener('DOMContentLoaded', () => {
            loadEventDetails();
            loadAttendees(); 
            lucide.createIcons();
        });

        /* Date Helpers */
        function toDisplayDate(val) {
            if (!val) return '--';
            const d = new Date(val);
            if (isNaN(d)) return val;
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = d.getFullYear();
            return `${day}-${month}-${year}`;
        }

        function fetchJSONP(url, callbackName) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                const name = `jsonp_${Date.now()}_${Math.floor(Math.random()*1000)}`;
                window[name] = (data) => { cleanup(); resolve(data); };
                const connector = url.includes('?') ? '&' : '?';
                script.src = `${url}${connector}callback=${name}`;
                document.body.appendChild(script);
                function cleanup() { delete window[name]; if (script.parentNode) document.body.removeChild(script); }
                setTimeout(() => { if (window[name]) { cleanup(); reject(new Error('Cloud timeout')); } }, 30000);
            });
        }

        async function loadEventDetails() {
            const params = new URLSearchParams(window.location.search);
            currentEventId = params.get('id');
            try {
                const data = await fetchJSONP(`${API_URL}?action=get_event_info&eventId=${currentEventId}`);
                // Robust Date & Time Formatting
                const cleanDate = (raw) => {
                    if (!raw) return 'Date TBD';
                    const d = new Date(raw);
                    return isNaN(d) ? raw : d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
                };

                const cleanTime = (raw) => {
                    if (!raw) return '';
                    if (typeof raw === 'string' && raw.includes('T')) {
                        const d = new Date(raw);
                        if (!isNaN(d)) return d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
                    }
                    return raw;
                };

                if (data.success) {
                    const formattedDate = cleanDate(data.startDate);
                    const endDateStr = data.endDate ? ` - ${cleanDate(data.endDate)}` : '';
                    const formattedTime = cleanTime(data.startTime);
                    const endTimeStr = data.endTime ? ` - ${cleanTime(data.endTime)}` : '';

                    document.getElementById('event-title').innerText = data.name;
                    document.getElementById('event-meta').innerHTML = `
                        <i data-lucide="calendar" size="16"></i> ${formattedDate}${endDateStr} &nbsp;•&nbsp; 
                        <i data-lucide="clock" size="16"></i> ${formattedTime}${endTimeStr} &nbsp;|&nbsp; 
                        <i data-lucide="indian-rupee" size="16"></i> Fee: ₹${data.fee || '0'}
                    `;
                    lucide.createIcons();
                    // Links
                    const regUrl = window.location.origin + window.location.pathname.replace('event-detail.html', 'register.html') + '?id=' + currentEventId;
                    document.getElementById('reg-link').value = regUrl;
                    document.getElementById('test-link').href = regUrl;
                }
            } catch (err) { console.error(err); }
        }

        async function loadAttendees() {
            try {
                const data = await fetchJSONP(`${API_URL}?action=get_attendees&eventId=${currentEventId}`);
                if (data.success) {
                    allAttendees = data.attendees || [];
                    renderAttendees(allAttendees);
                }
            } catch (err) { console.error(err); }
        }

        function renderAttendees(list) {
            const container = document.getElementById('attendee-list');
            const countEl = document.getElementById('attendee-count');
            const totalEl = document.getElementById('total-collected');
            
            countEl.innerText = list.length;
            
            let total = 0;
            container.innerHTML = list.map((att, index) => {
                const amount = parseInt(att.amount || 0);
                total += amount;
                const photoUrl = att.photoId ? `https://lh3.googleusercontent.com/d/${att.photoId}=s120` : `https://api.dicebear.com/7.x/initials/svg?seed=${att.name}`;
                const statusConfirm = amount > 0;
                
                return `
                <tr>
                    <td style="text-align: center;">
                        <input type="checkbox" class="attendee-checkbox" data-id="${att.id}" data-name="${att.name}" data-photo="${photoUrl}" data-phone="${att.phone}" data-address="${att.address}" style="width: 18px; height: 18px; cursor: pointer;">
                    </td>
                    <td style="color: var(--text-muted); font-weight: 600;">${index + 1}</td>
                    <td>
                        <a href="student-profile.html?eventId=${currentEventId}&studentId=${att.id}&admin=true" class="photo-id-link">
                            <img src="${photoUrl}" style="width: 45px; height: 45px; border-radius: 8px; object-fit: cover;">
                            <span style="font-weight: 700; font-size: 0.7rem;">${att.id}</span>
                        </a>
                    </td>
                    <td>
                        <div style="font-weight: 600;">${att.name}</div>
                        <div style="font-size: 0.75rem; color: var(--text-muted);">${att.phone}</div>
                        <div style="font-size: 0.7rem; color: var(--primary); margin-top: 4px;">
                            ${att.gender || ''} | Age: ${att.age || ''} | DOB: ${toDisplayDate(att.dob)}
                        </div>
                    </td>
                    <td>
                        <button onclick="toggleAttendance(this, '${att.id}')" 
                                class="btn-attendance ${att.markedToday ? 'marked' : 'btn-outline'}">
                            <i data-lucide="${att.markedToday ? 'check' : 'circle'}" size="14"></i>
                            <span>${att.markedToday ? 'Present' : 'Absent'}</span>
                        </button>
                    </td>
                    <td>
                        <input type="number" class="inline-input" value="${att.amount || ''}" placeholder="0" 
                               onchange="updatePaymentInfo('${att.id}', this, 'amount')">
                    </td>
                    <td>
                        <select class="inline-input" onchange="updatePaymentInfo('${att.id}', this, 'paymentMode')">
                            <option value="Cash" ${att.paymentMode === 'Cash' ? 'selected' : ''}>Cash</option>
                            <option value="Online" ${att.paymentMode === 'Online' ? 'selected' : ''}>Online</option>
                        </select>
                    </td>
                    <td>
                        <input type="text" class="inline-input" value="${att.utr || ''}" placeholder="UTR" title="UTR / Trans ID"
                               onchange="updatePaymentInfo('${att.id}', this, 'utr')">
                    </td>
                    <td>
                        <span class="status-badge ${statusConfirm ? 'status-confirmed' : 'status-pending'}" id="status-${att.id}">
                            ${statusConfirm ? 'Confirmed' : 'Pending'}
                        </span>
                    </td>
                </tr>
                `;
            }).join('');
            
            totalEl.innerText = `₹${total}`;
            lucide.createIcons();
        }

        async function toggleAttendance(btn, studentId) {
            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader" class="animate-spin" size="14"></i>`;
            lucide.createIcons();

            try {
                const data = await fetchJSONP(`${API_URL}?action=mark_attendance&eventId=${currentEventId}&studentId=${studentId}`);
                if (data.success) {
                    const isMarked = data.result === 'marked';
                    btn.className = `btn-attendance ${isMarked ? 'marked' : 'btn-outline'}`;
                    btn.innerHTML = `<i data-lucide="${isMarked ? 'check' : 'circle'}" size="14"></i> <span>${isMarked ? 'Present' : 'Absent'}</span>`;
                }
            } catch (err) { alert("Cloud busy. Try again."); btn.innerHTML = originalHTML; }
            btn.disabled = false;
            lucide.createIcons();
        }

        async function updatePaymentInfo(studentId, input, field) {
            const row = input.closest('tr');
            const amountInput = row.querySelector('input[type="number"]');
            const modeInput = row.querySelector('select');
            const utrInput = row.querySelector('input[type="text"]');
            const statusBadge = document.getElementById(`status-${studentId}`);
            
            input.style.borderColor = "var(--primary)";
            
            const payload = {
                action: 'update_payment_info',
                eventId: currentEventId,
                studentId: studentId,
                amount: amountInput.value,
                paymentMode: modeInput.value,
                utr: utrInput.value
            };

            try {
                const data = await fetchJSONP(`${API_URL}?${new URLSearchParams(payload).toString()}`);
                if (data.success) {
                    input.style.borderColor = "#4ade80";
                    // Update Status Badge dynamically
                    const isConfirmed = parseInt(amountInput.value) > 0;
                    statusBadge.className = `status-badge ${isConfirmed ? 'status-confirmed' : 'status-pending'}`;
                    statusBadge.innerText = isConfirmed ? 'Confirmed' : 'Pending';
                    
                    // Update total
                    let newTotal = 0;
                    document.querySelectorAll('input[type="number"]').forEach(inp => newTotal += parseInt(inp.value || 0));
                    document.getElementById('total-collected').innerText = `₹${newTotal}`;
                }
            } catch (err) { input.style.borderColor = "#f87171"; }
        }

        function filterAttendees() {
            const q = document.getElementById('attendee-search').value.trim().toLowerCase();
            if (!q) {
                renderAttendees(allAttendees);
                return;
            }
            const filtered = allAttendees.filter(a => {
                const name = (a.name || "").toLowerCase();
                const id = (a.id || "").toLowerCase();
                const phone = String(a.phone || "");
                return name.includes(q) || id.includes(q) || phone.includes(q);
            });
            renderAttendees(filtered);
        }

        function copyLink() {
            const el = document.getElementById('reg-link');
            el.select();
            document.execCommand('copy');
            alert("📋 Registration link copied!");
        }

        function exportData() {
            alert("Exporting attendee list as Excel...");
        }

        /* NEW LOGIC - SELECTION & MODALS */
        function toggleSelectAll(master) {
            document.querySelectorAll('.attendee-checkbox').forEach(cb => cb.checked = master.checked);
        }

        function getSelectedIDs() {
            return Array.from(document.querySelectorAll('.attendee-checkbox:checked')).map(cb => ({
                id: cb.dataset.id,
                name: cb.dataset.name,
                photo: cb.dataset.photo,
                phone: cb.dataset.phone,
                address: cb.dataset.address
            }));
        }

        /* PRINT ID CARDS LOGIC */
        function printSelectedIDs() {
            const selected = getSelectedIDs();
            if (selected.length === 0) return alert("Please select participants first.");
            
            const eventName = document.getElementById('event-title').innerText.toUpperCase();
            const printArea = document.getElementById('print-area');
            printArea.innerHTML = '';
            
            let html = '';
            for (let i = 0; i < selected.length; i += 8) { // 8 per page (2 columns x 4 rows)
                const pageItems = selected.slice(i, i + 8);
                html += `<div class="print-page">`;
                pageItems.forEach(s => {
                    html += `
                    <div class="id-card-print" style="border: 2px solid #000; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column;">
                        <div style="background: #6366f1; color: white; padding: 6px; text-align: center; font-weight: 800; font-size: 0.75rem; border-bottom: 2px solid #000;">${eventName}</div>
                        <div style="flex: 1; display: flex; gap: 12px; align-items: center; padding: 10px;">
                            <img src="${s.photo}" style="width: 70px; height: 80px; object-fit: cover; border: 2px solid #000; border-radius: 6px;">
                            <div style="flex: 1; display: flex; flex-direction: column; gap: 2px;">
                                <div style="font-size: 0.55rem; color: #666; font-weight: 700;">NAME</div>
                                <div style="font-size: 0.95rem; font-weight: 900; line-height: 1;">${s.name.toUpperCase()}</div>
                                <div style="font-size: 0.55rem; color: #666; font-weight: 700; margin-top: 4px;">ID: ${s.id}</div>
                                <div style="font-size: 0.65rem; font-weight: 700;">MOB: ${s.phone}</div>
                                <div style="font-size: 0.55rem; color: #666; font-weight: 700; margin-top: 4px;">ADDRESS</div>
                                <div style="font-size: 0.65rem; line-height: 1.1;">${s.address || '--'}</div>
                            </div>
                        </div>
                        <div style="background: #6366f1; color: white; padding: 4px; text-align: center; font-size: 0.6rem; font-weight: 600;">- Official Participant ID -</div>
                    </div>
                    `;
                });
                html += `</div>`;
            }
            
            printArea.innerHTML = html;
            window.print();
        }

        /* PHOTO UPLOAD LOGIC */
        function openPhotoModal() {
            const selected = getSelectedIDs();
            if (selected.length === 0) return alert("Select students to tag in the photos first!");
            
            const listEl = document.getElementById('tag-names-list');
            listEl.innerHTML = selected.map(s => `<span style="background: var(--primary); color: white; padding: 4px 10px; border-radius: 6px; font-weight: 600;">@${s.name}</span>`).join('');
            
            document.getElementById('photo-modal').style.display = 'flex';
        }

        function closePhotoModal() {
            document.getElementById('photo-modal').style.display = 'none';
        }

        async function handleActivityUpload(e) {
            e.preventDefault();
            const btn = document.getElementById('upload-activity-btn');
            const files = document.getElementById('activity-files').files;
            const desc = document.getElementById('activity-desc').value;
            const selected = getSelectedIDs();
            const studentIds = selected.map(s => s.id).join(',');

            if (files.length === 0) return;

            btn.disabled = true;
            btn.innerText = `Uploading 0/${files.length}...`;

            try {
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    btn.innerText = `Uploading ${i + 1}/${files.length}...`;
                    
                    const base64 = await readFileAsBase64(file);
                    
                    // JSONP has URL limits, which is bad for Multiple Photos.
                    // But we'll try to push them one by one.
                    const res = await fetchJSONP(`${API_URL}?action=upload_activity_photos&eventId=${currentEventId}&studentIds=${studentIds}&desc=${encodeURIComponent(desc)}&fileName=${encodeURIComponent(file.name)}&fileData=${encodeURIComponent(base64)}`);
                    
                    if (!res.success) throw new Error(res.message);
                }
                
                alert("✅ Success! Photos uploaded and tagged.");
                closePhotoModal();
            } catch (err) {
                alert("❌ Upload failed. Photos might be too large for JSONP limits. Try uploading fewer at a time.");
                console.error(err);
            }
            
            btn.disabled = false;
            btn.innerText = "Start Upload";
        }

        function readFileAsBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
    </script>
</body>
</html>
