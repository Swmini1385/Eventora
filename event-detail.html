<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Event | Eventora</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .event-header {
            margin-bottom: 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .share-card {
            padding: 1.5rem;
            margin-bottom: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
            border-left: 4px solid var(--primary);
        }

        .attendee-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 0.5rem;
        }

        .attendee-table th {
            text-align: left;
            padding: 1rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .attendee-table td {
            padding: 1.25rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-top: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-border);
        }

        .attendee-table tr td:first-child {
            border-left: 1px solid var(--glass-border);
            border-top-left-radius: 0.75rem;
            border-bottom-left-radius: 0.75rem;
        }

        .attendee-table tr td:last-child {
            border-right: 1px solid var(--glass-border);
            border-top-right-radius: 0.75rem;
            border-bottom-right-radius: 0.75rem;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-success { background: rgba(34, 197, 94, 0.1); color: #4ade80; }
        .badge-warning { background: rgba(234, 179, 8, 0.1); color: #facc15; }

        @media (max-width: 768px) {
            .event-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .share-card { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <div class="container" style="padding: 40px 0;">
        <nav style="margin-bottom: 40px;">
            <a href="dashboard.html" class="nav-item" style="display: inline-flex; align-items: center; text-decoration: none;">
                <i data-lucide="arrow-left"></i> Back to Dashboard
            </a>
            <div class="logo">
                <i data-lucide="sparkles"></i> Eventora
            </div>
        </nav>

        <header class="event-header">
            <div>
                <h1 id="event-title" style="margin-bottom: 0.5rem;">Event Management</h1>
                <p id="event-meta" style="color: var(--text-muted); font-size: 1.1rem;">Details and attendee list</p>
            </div>
            <div style="display: flex; gap: 0.75rem;">
                <button class="btn btn-outline" onclick="exportData()"><i data-lucide="download"></i> Export Excel</button>
                <button class="btn btn-primary" onclick="showShareModal()"><i data-lucide="share-2"></i> Share Form</button>
            </div>
        </header>

        <!-- Share Info Card -->
        <div class="glass share-card">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <div style="background: rgba(99, 102, 241, 0.1); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary);">
                    <i data-lucide="link"></i>
                </div>
                <div>
                    <h4 style="font-weight: 700;">Public Registration Link</h4>
                    <p style="color: var(--text-muted); font-size: 0.85rem;">Share this URL with participants to collect registrations.</p>
                </div>
            </div>
            <div style="display: flex; gap: 0.5rem; flex: 1; max-width: 600px; margin-left: 2rem;">
                <input type="text" id="reg-link" readonly value="Loading..." style="flex: 1; padding: 0.75rem; border-radius: 0.5rem; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: #fff;">
                <button class="btn btn-primary" onclick="copyLink()" style="padding: 0.75rem 1.25rem;">Copy</button>
                <a href="#" id="test-link" target="_blank" class="btn btn-outline" style="padding: 0.75rem 1rem; font-size: 0.85rem;">Test Link <i data-lucide="external-link"></i></a>
            </div>
        </div>

        <!-- Attendee List -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h3>Participants List (<span id="attendee-count">0</span>)</h3>
            <div style="position: relative;">
                <input type="text" placeholder="Search attendee..." style="padding: 0.75rem 1rem 0.75rem 2.5rem; border-radius: 2rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff; font-size: 0.9rem;">
                <i data-lucide="search" size="18" style="position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
            </div>
        </div>

        <div style="overflow-x: auto;">
            <table class="attendee-table">
                <thead>
                        <th>Photo & ID</th>
                        <th>Participant Name</th>
                        <th>Contact No</th>
                        <th>Status</th>
                        <th>Amount</th>
                        <th>Attendance</th>
                        <th>Profile</th>
                </thead>
                <tbody id="attendee-list">
                    <!-- Example row -->
                    <tr>
                        <td colspan="6" style="text-align: center; color: var(--text-muted); background: none; border: none; padding: 4rem;">
                            No registrations received yet.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyaMg4MdPTN_GYkfmpfti3M5JTAchwLm-F8UCMQVyjS9Gn7PjyBOiBs7dK4onASyaQPdQ/exec";
        
        document.addEventListener('DOMContentLoaded', () => {
            loadEventDetails();
            loadAttendees(); 
            lucide.createIcons();
        });

        // Robust JSONP Fetch Helper
        function fetchJSONP(url, callbackName) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                const name = `jsonp_${Date.now()}_${Math.floor(Math.random()*1000)}`;
                window[name] = (data) => { cleanup(); resolve(data); };
                script.onerror = () => { cleanup(); reject(new Error('JSONP request failed')); };

                const connector = url.includes('?') ? '&' : '?';
                script.src = `${url}${connector}callback=${name}`;
                document.body.appendChild(script);

                function cleanup() {
                    delete window[name];
                    if (script.parentNode) document.body.removeChild(script);
                }
                
                setTimeout(() => {
                    if (window[name]) {
                        cleanup();
                        reject(new Error('Cloud response timed out (30s)'));
                    }
                }, 30000);
            });
        }

        let currentEventId = '';

        async function loadEventDetails() {
            const params = new URLSearchParams(window.location.search);
            currentEventId = params.get('id');
            const user = JSON.parse(localStorage.getItem('eventora_user'));
            if (!user) return;

            // Show initial cached data if available
            const events = JSON.parse(localStorage.getItem('eventora_events_' + user.identifier) || '[]');
            const cachedEvent = events.find(e => e.id === currentEventId);

            if (cachedEvent) {
                document.title = `${cachedEvent.name} | Eventora`;
                document.getElementById('event-title').innerText = cachedEvent.name;
                document.getElementById('event-meta').innerText = "Loading fresh details... ⏳";
            }

            // Fetch REAL metadata from the cloud (Row 1)
            try {
                const data = await fetchJSONP(`${API_URL}?action=get_event_info&eventId=${currentEventId}`);
                if (data.success) {
                    document.title = `${data.name} | Eventora`;
                    document.getElementById('event-title').innerText = data.name;
                    
                    let dateStr = data.startDate || "TBA";
                    if (data.endDate) dateStr += ` to ${data.endDate}`;
                    if (data.startTime) dateStr += ` (${data.startTime} to ${data.endTime || '??:??'})`;
                    
                    document.getElementById('event-meta').innerHTML = `
                        <i data-lucide="calendar" size="16"></i> Date: ${dateStr} &nbsp;|&nbsp; 
                        <i data-lucide="map-pin" size="16"></i> Venue: ${data.venue || 'TBA'} &nbsp;|&nbsp;
                        <i data-lucide="indian-rupee" size="16"></i> Fee: ₹${data.fee || '100'}
                    `;
                    lucide.createIcons();
                    
                    // Update Local Storage with fresh name/date if needed
                    const updatedEvents = events.map(e => e.id === currentEventId ? { ...e, name: data.name, date: dateStr, fee: data.fee } : e);
                    localStorage.setItem('eventora_events_' + user.identifier, JSON.stringify(updatedEvents));
                }
            } catch (err) {
                console.error("Metadata fetch failed:", err);
            }

            // Generate Registration Link
            let currentPath = window.location.pathname;
            let directoryPath = currentPath.substring(0, currentPath.lastIndexOf('/'));
            let protocol = window.location.protocol;
            let host = window.location.host;
            const fullBaseUrl = protocol + "//" + (host ? host : "") + directoryPath + "/";
            const regUrl = fullBaseUrl + 'register.html?id=' + currentEventId;
            document.getElementById('reg-link').value = regUrl;
            document.getElementById('test-link').href = regUrl;
        }

        async function loadAttendees() {
            const container = document.getElementById('attendee-list');
            container.innerHTML = `<tr><td colspan="7" style="text-align: center; color: var(--text-muted); padding: 4rem;">Loading participants... ⏳</td></tr>`;
            
            try {
                const data = await fetchJSONP(`${API_URL}?action=get_attendees&eventId=${currentEventId}`);
                
                if (data.success) {
                    renderAttendees(data.attendees);
                } else {
                    container.innerHTML = `<tr><td colspan="7" style="text-align: center; color: #f87171; padding: 4rem;">${data.message || 'Error loading list.'}</td></tr>`;
                }
            } catch (err) {
                console.error("Attendee fetch failed:", err);
                container.innerHTML = `<tr><td colspan="7" style="text-align: center; color: #f87171; padding: 4rem;">Offline Mode: Connect backend to see real-time data.</td></tr>`;
            }
        }

        function renderAttendees(list) {
            const container = document.getElementById('attendee-list');
            const countEl = document.getElementById('attendee-count');
            
            if (!list || list.length === 0) {
                container.innerHTML = `<tr><td colspan="6" style="text-align: center; color: var(--text-muted); padding: 4rem;">No registrations received yet.</td></tr>`;
                countEl.innerText = "0";
                return;
            }

            container.innerHTML = list.map(att => {
                const photoUrl = att.photoId ? `https://lh3.googleusercontent.com/d/${att.photoId}=s120` : `https://api.dicebear.com/7.x/initials/svg?seed=${att.name}`;
                const isDone = att.markedToday;
                return `
                <tr>
                    <td style="text-align: center; vertical-align: middle;">
                        <img src="${photoUrl}" style="width: 50px; height: 50px; border-radius: 8px; object-fit: cover; border: 1px solid var(--glass-border); margin-bottom: 0.5rem; display: block; margin-left: auto; margin-right: auto;">
                        <span style="font-weight: 700; color: var(--primary); font-size: 0.75rem;">${att.id || 'N/A'}</span>
                    </td>
                    <td style="font-weight: 600;">${att.name || 'Anonymous'}</td>
                    <td>${att.phone || '--'}</td>
                    <td><span class="status-badge status-confirmed">${att.status || 'Confirmed'}</span></td>
                    <td style="font-weight: 700;">₹${att.amount || '0'}</td>
                    <td>
                        <button onclick="markAttendance(this, '${att.id}')" 
                                class="btn btn-outline ${isDone ? 'status-confirmed' : ''}" 
                                style="padding: 0.4rem 0.8rem; font-size: 0.8rem; ${isDone ? 'border-color: #4ade80;' : ''}"
                                ${isDone ? 'disabled' : ''}>
                            <i data-lucide="${isDone ? 'check' : 'check'}" size="14"></i> 
                            <span>${isDone ? '<span style="color: #4ade80;">Today Done</span>' : 'Mark'}</span>
                        </button>
                    </td>
                    <td>
                        <a href="student-profile.html?eventId=${currentEventId}&studentId=${att.id}&admin=true" class="btn btn-outline" style="padding: 0.5rem;" title="View Profile">
                            <i data-lucide="user" size="16"></i>
                        </a>
                    </td>
                </tr>
            `;}).join('');
            lucide.createIcons();
        }

        async function markAttendance(btn, studentId) {
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader" class="animate-spin" size="14"></i>`;
            lucide.createIcons();

            try {
                const data = await fetchJSONP(`${API_URL}?action=mark_attendance&eventId=${currentEventId}&studentId=${studentId}`);
                if (data.success) {
                    btn.innerHTML = `<i data-lucide="check" size="14"></i> <span style="color: #4ade80;">Done</span>`;
                    btn.style.borderColor = "#4ade80";
                } else {
                    alert("❌ Error: " + data.message);
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }
            } catch (err) {
                console.error(err);
                alert("⚠️ Cloud error");
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
            lucide.createIcons();
        }

        function copyLink() {
            const input = document.getElementById('reg-link');
            input.select();
            document.execCommand('copy');
            alert("📋 Link copied to clipboard!");
        }

        function exportData() {
            alert("Exporting attendee list as Excel...");
        }
    </script>
</body>
</html>
