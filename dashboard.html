<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizer Dashboard | Eventora</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .dashboard-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            padding: 2rem;
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .main-content {
            padding: 2rem 4rem;
            overflow-y: auto;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            text-decoration: none;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .nav-item.active {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            font-weight: 600;
        }

        .nav-item:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            padding: 1.5rem;
        }

        .event-card {
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            transition: var(--transition);
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-card {
            width: 100%;
            max-width: 550px;
            padding: 2.5rem;
            max-height: 90vh;
            overflow-y: auto;
        }

        /* Custom Scrollbar for Modal */
        .modal-card::-webkit-scrollbar { width: 5px; }
        .modal-card::-webkit-scrollbar-track { background: transparent; }
        .modal-card::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block; font-size: 0.875rem; margin-bottom: 0.5rem; color: var(--text-muted);
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 0.8rem 1rem; background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border); border-radius: 0.75rem; color: #fff;
        }

        @media (max-width: 900px) {
            .dashboard-layout { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .main-content { padding: 1.5rem; }
        }
    </style>
</head>
<body class="dashboard-body">
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo" style="font-size: 1.5rem; margin-bottom: 2rem;">
                <i data-lucide="sparkles"></i> Eventora
            </div>
            <a href="#" class="nav-item active"><i data-lucide="layout-dashboard"></i> Overview</a>
            <a href="#" class="nav-item"><i data-lucide="calendar"></i> My Events</a>
            <a href="#" class="nav-item"><i data-lucide="settings"></i> Settings</a>
            <div style="margin-top: auto;">
                <a href="#" onclick="logout()" class="nav-item" style="color: #f87171;"><i data-lucide="log-out"></i> Logout</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem;">
                <div>
                    <h2 id="welcome-msg">Hello, Organizer!</h2>
                    <p style="color: var(--text-muted);">Manage your active events and attendees from here.</p>
                </div>
                <button class="btn btn-primary" onclick="showCreateModal()">
                    <i data-lucide="plus"></i> Create Event
                </button>
            </header>

            <!-- Stats Overview -->
            <div class="stats-grid">
                <div class="glass stat-card">
                    <p style="color: var(--text-muted); font-size: 0.9rem;">Total Events</p>
                    <h3 style="font-size: 1.8rem; margin-top: 0.5rem;" id="total-events-stat">0</h3>
                </div>
                <div class="glass stat-card">
                    <p style="color: var(--text-muted); font-size: 0.9rem;">Total Attendees</p>
                    <h3 style="font-size: 1.8rem; margin-top: 0.5rem;" id="total-attendees-stat">0</h3>
                </div>
                <div class="glass stat-card">
                    <p style="color: var(--text-muted); font-size: 0.9rem;">Total Earnings</p>
                    <h3 style="font-size: 1.8rem; margin-top: 0.5rem;" id="total-earnings-stat">₹0</h3>
                </div>
            </div>

            <!-- Events List -->
            <h3>Your Recent Events</h3>
            <div id="events-list" style="margin-top: 1.5rem;">
                <!-- Event cards will be injected here -->
                <div class="glass" style="padding: 3rem; text-align: center; border-style: dashed; background: transparent;">
                    <p style="color: var(--text-muted);">No events created yet. Start by creating one!</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Create Event Modal -->
    <div class="modal-overlay" id="createModal">
        <div class="glass modal-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2>New Event</h2>
                <button type="button" onclick="closeCreateModal()" style="background: none; border: none; color: #fff; cursor: pointer;"><i data-lucide="x"></i></button>
            </div>
            <form id="create-event-form" onsubmit="handleCreateEvent(event)">
                <div class="form-group">
                    <label>Event Name</label>
                    <input type="text" id="event-name" required placeholder="e.g. Summer Camp 2026">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Start Date</label>
                        <input type="date" id="event-date" required>
                    </div>
                    <div class="form-group">
                        <label>End Date</label>
                        <input type="date" id="event-end-date" required>
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Registration Fee (₹)</label>
                        <input type="number" id="event-fee" value="100" required>
                    </div>
                    <div class="form-group">
                        <label>Student ID Prefix (A, B, S...)</label>
                        <input type="text" id="event-prefix" maxlength="4" placeholder="e.g. A" value="A">
                    </div>
                </div>
                <div class="form-group">
                    <label>WhatsApp Group Link (Optional)</label>
                    <input type="url" id="event-wa-link" placeholder="https://chat.whatsapp.com/...">
                </div>
                <div class="form-group">
                    <label>Event Venue / Location</label>
                    <input type="text" id="event-venue" required placeholder="e.g. Community Hall, Mumbai">
                </div>
                <div class="form-group">
                    <label>UPI ID for Payment (Optional)</label>
                    <input type="text" id="event-upi-id" placeholder="e.g. yourname@okaxis">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="event-desc" rows="3" placeholder="Tell more about the event..."></textarea>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.5rem;">
                    <button type="button" onclick="closeCreateModal()" class="btn btn-outline">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="save-event-btn">Create Event</button>
                </div>
            </form>
        </div>
    </div>

    <script src="dashboard.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
